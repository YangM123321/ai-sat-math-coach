name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80
      - run: python -m compileall app

  migrations:
    runs-on: ubuntu-latest
    # Validates the Alembic migration chain against PostgreSQL, matching the
    # production database engine used in docker-compose.yml. Intentionally
    # separate from the `test` job: pytest runs against SQLite and never
    # touches Alembic, so it doesn't need this service container.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sat
          POSTGRES_PASSWORD: sat
          POSTGRES_DB: sat_coach
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sat -d sat_coach"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://sat:sat@localhost:5432/sat_coach
      DIAGNOSTIC_PROVIDER: rule_based
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Show migration history
        run: alembic history --verbose

      - name: Show migration heads
        run: alembic heads

      - name: Apply migration chain to a clean PostgreSQL database
        run: |
          echo "Running 'alembic upgrade head' against a clean PostgreSQL 16 database..."
          if ! alembic upgrade head; then
            echo "::error::Alembic migration chain failed to apply cleanly against PostgreSQL. See the traceback above for the failing revision."
            exit 1
          fi

      - name: Verify database reached the expected head revision
        run: |
          CURRENT=$(alembic current 2>/dev/null | awk '{print $1}')
          HEAD=$(alembic heads 2>/dev/null | awk '{print $1}')
          echo "Database current revision: $CURRENT"
          echo "Expected head revision:    $HEAD"
          if [ -z "$HEAD" ] || [ "$CURRENT" != "$HEAD" ]; then
            echo "::error::Database revision ('$CURRENT') does not match the expected head revision ('$HEAD') after upgrade."
            exit 1
          fi
          echo "Database is at the expected head revision."

  security:
    runs-on: ubuntu-latest
    # Independent of `test`/`migrations` (no `needs:`) -- a vulnerability
    # finding isn't causally related to whether the app's tests pass, so
    # gating it behind another job would only delay the security signal.
    # Read-only: this job only checks out the repo and queries public
    # vulnerability data; it never needs to write anything.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install application dependencies
        run: python -m pip install -r requirements.txt
      - name: Install pip-audit
        run: python -m pip install pip-audit
      - name: Audit installed dependencies for known vulnerabilities
        run: python -m pip_audit

  secret-scan:
    runs-on: ubuntu-latest
    # Independent of test/migrations/security (no `needs:`) -- same
    # rationale as the security (pip-audit) job: a secret-scanning finding
    # isn't causally related to other jobs' outcomes, so gating it behind
    # them would only delay the signal. Read-only: this job only checks
    # out the repo and scans it locally; it never needs to write anything.
    permissions:
      contents: read
    steps:
      # v6, not v4: gitleaks-action@v3 requires the Node 24 runtime, and
      # actions/checkout@v6 is the version the action's own docs validate
      # against for that runtime (v2/actions/checkout@v4 are being
      # deprecated by GitHub -- Node 20 support ends Sept 16, 2026).
      - uses: actions/checkout@v6
        with:
          # Full history, not the default shallow (fetch-depth: 1) clone --
          # this control exists to catch secrets committed anywhere in
          # history, not merely in the currently checked-out tree. Matches
          # the action's own documented usage.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disabled explicitly rather than relying on the read-only
          # permissions block above to make these calls fail silently:
          # this job has no PR-commenting or artifact-upload role by
          # design, not by accident.
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

  sast:
    runs-on: ubuntu-latest
    # Independent of test/migrations/security/secret-scan (no `needs:`) --
    # same rationale as the other security jobs: a SAST finding isn't
    # causally related to other jobs' outcomes, so gating it behind them
    # would only delay the signal. Read-only: this job only checks out the
    # repo and scans it locally with Bandit; it never needs to write
    # anything except the report artifact below.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Bandit
        run: python -m pip install bandit==1.9.4

      - name: Generate full Bandit report (all severities/confidences -- visibility only)
        # --exit-zero is Bandit's own flag (not a GitHub Actions construct):
        # it neutralizes only exit code 1 ("issues found" -- expected here,
        # since this step's purpose is visibility, not gating). Genuine
        # tool/usage errors (bad arguments, an unreadable config file, exit
        # code 2) are untouched by it and still fail the job normally --
        # unlike `continue-on-error`, which would blindly swallow any
        # failure reason. It also matches local reproduction exactly, where
        # `continue-on-error` has no effect at all. --exit-zero changes only
        # the process exit code, never what is written to the report: every
        # finding is still present in bandit-report.json, unfiltered (see
        # architecture-review verification that its `results` are
        # byte-identical with and without the flag). The actual gate
        # remains the separate, unmodified "Enforce Bandit gate" step below,
        # whose exit code is never rewritten.
        run: bandit -r app -f json -o bandit-report.json --exit-zero

      - name: Upload Bandit report
        # v7, not v4: v4 targets the Node 20 runtime GitHub is deprecating.
        # v5-v7 make no breaking change to the `name`/`path` inputs used
        # here (confirmed against each release's changelog); v6 is the
        # first version that actually defaults to the Node 24 runtime (v5
        # only added preliminary support without switching the default).
        # upload-artifact isn't used by any other job in this file, so this
        # upgrade doesn't create version inconsistency elsewhere.
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Enforce Bandit gate (medium+ severity, medium+ confidence)
        # Scans only app/ -- the production application source -- not
        # tests/, scripts/, or alembic/. Medium+ severity and medium+
        # confidence (-ll -ii): the baseline false-positive source at this
        # repo's size (B105, keyword-based hardcoded-password matches on
        # non-secret constants) reports at Low severity, so this threshold
        # filters exactly that noise without silencing anything at or above
        # Medium. Natural exit code only -- no continue-on-error, no
        # `|| true`, no exit-code rewriting.
        run: bandit -r app -ll -ii

  image-scan:
    runs-on: ubuntu-latest
    # Independent of test/migrations/security/secret-scan/sast (no `needs:`)
    # -- same rationale as the other security jobs: a vulnerability found in
    # the built image isn't causally related to whether the app's tests
    # pass, so gating it behind another job would only delay the signal.
    # Builds and scans the application's own Docker image locally -- the
    # image is never pushed to any registry, so no registry credentials are
    # needed anywhere in this job.
    #
    # Enforcement-before-reporting ordering (corrective, post-review): the
    # fixable HIGH/CRITICAL gate runs immediately after the image is built
    # and scanned, *before* SARIF generation/upload. Every step after the
    # gate is reporting, not enforcement, and is marked `continue-on-error:
    # true` with `if: always()` so that a SARIF-upload permission failure
    # (expected on a fork-originated pull_request -- GITHUB_TOKEN is
    # downgraded to read-only there, so `security-events: write` is
    # unavailable regardless of what this file requests) or any other
    # reporting-step failure can never prevent the gate from running or be
    # mistaken for the gate's own result. The gate step itself has no
    # continue-on-error and is the only step whose failure fails this job.
    permissions:
      contents: read
      security-events: write
    timeout-minutes: 15
    concurrency:
      group: image-scan-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Build image locally (never pushed to any registry)
        # No continue-on-error here, deliberately -- with no image, nothing
        # downstream (reporting or enforcement) can run meaningfully, so a
        # build failure must stop the job.
        run: docker build -t ai-sat-math-coach:ci-scan .

      - name: Compute daily cache key
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache Trivy vulnerability database
        # Path matches trivy-action's own default cache-dir exactly. Keyed
        # by UTC date so the cache rotates daily instead of growing stale
        # indefinitely; restore-keys falls back to the most recent available
        # cache on a miss, still avoiding a full re-download in most cases.
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.cache/trivy
          key: trivy-db-${{ steps.date.outputs.date }}
          restore-keys: |
            trivy-db-

      - name: Full vulnerability scan, JSON (unfiltered -- reporting only, never fails the job)
        # Pinned to an exact commit SHA, not a mutable tag -- aquasecurity/
        # trivy-action suffered a real supply-chain compromise in March 2026
        # (76 of 77 tags force-pushed to a malicious commit for ~12 hours,
        # GHSA-69fq-xp46-6x23). v0.36.0 (this commit) is the current
        # release, published well after remediation, and is not in the
        # affected range for that incident or for CVE-2026-26189 (fixed
        # >=0.34.1). `version: v0.72.0` explicitly overrides this action's
        # own bundled Trivy default (v0.70.0) to use a release that includes
        # the fix for CVE-2026-55092 (Trivy path traversal, fixed 0.71.1) --
        # not otherwise reachable here anyway, since that CVE requires
        # overriding the default (Aqua-operated) vulnerability-database
        # source, which this workflow never does. `continue-on-error: true`
        # -- reporting, not enforcement; a failure here must not stop the
        # gate below from running.
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ai-sat-math-coach:ci-scan
          scan-type: image
          scanners: vuln
          vuln-type: os,library
          format: json
          output: trivy-results.json
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '0'
          version: v0.72.0

      - name: Enforce gate (fixable HIGH/CRITICAL vulnerabilities only)
        # The actual security enforcement for this job -- deliberately runs
        # before any reporting step that could fail for reasons unrelated to
        # vulnerabilities (SARIF-upload permissions, a transient GitHub
        # code-scanning outage, etc.). `if: always()` makes it run even if
        # the JSON reporting scan above failed; no `continue-on-error`, no
        # `|| true`, no pipeline -- this is the one step in the job whose
        # natural, unmodified exit code is allowed to fail the build. Fails
        # (exit-code 1) only for a fixable HIGH or CRITICAL finding;
        # everything else (lower severity, or a HIGH/CRITICAL with no
        # available fix) is visible in the JSON/SARIF reports but never
        # blocks. A scanner/database infrastructure failure (e.g. the Trivy
        # DB endpoint being unreachable) fails this step for a distinct
        # reason -- a non-zero exit here without Trivy's own vulnerability
        # table in the log above it indicates a tool/infrastructure
        # problem, not a finding.
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ai-sat-math-coach:ci-scan
          scan-type: image
          scanners: vuln
          vuln-type: os,library
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          version: v0.72.0

      - name: Full vulnerability scan, SARIF (unfiltered -- reporting only, never fails the job)
        # Runs regardless of the gate's outcome (`if: always()`) so the
        # full report is available even when the gate above has already
        # failed the build -- exactly when a maintainer most needs it.
        # `continue-on-error: true` -- reporting, not enforcement.
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ai-sat-math-coach:ci-scan
          scan-type: image
          scanners: vuln
          vuln-type: os,library
          format: sarif
          output: trivy-results.sarif
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '0'
          version: v0.72.0

      - name: Upload SARIF to GitHub Security tab
        # Best-effort reporting, not enforcement -- see the job-level
        # comment above. Two independent safeguards, deliberately combined:
        # (1) the `if:` condition below skips this step entirely for a
        # fork-originated pull_request, where GITHUB_TOKEN is downgraded to
        # read-only by GitHub itself regardless of the `permissions:` block
        # above, so the upload would be guaranteed to fail on a permission
        # error -- skipping it there accurately reflects a restriction this
        # workflow cannot lift (doing so would require `pull_request_target`,
        # which runs untrusted fork code with this repository's own
        # elevated permissions -- deliberately not used here). Push events
        # and same-repository pull requests (source repo == target repo)
        # are unaffected and still upload normally. (2) `continue-on-error:
        # true` additionally absorbs any other, unrelated upload failure
        # (e.g. a transient GitHub code-scanning outage) so it can never
        # affect this job's overall result either. `if: always()` (ANDed
        # with the fork-safety check) lets this still run even if the gate
        # above already failed.
        if: always() && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: trivy-results.sarif

      - name: Upload JSON report artifact
        # Reporting, not enforcement -- runs regardless of the gate's
        # outcome or any earlier reporting-step failure, and never fails
        # the job itself. This artifact (not the Security tab -- see the
        # job-level comment) is the authoritative, always-available,
        # downloadable vulnerability report, including on fork PRs where
        # SARIF upload is skipped above. 30-day retention: long enough for
        # a maintainer to review a flagged build without indefinitely
        # accumulating scan history.
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: trivy-report
          path: trivy-results.json
          retention-days: 30
